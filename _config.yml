title: Javae Elliott
description: |
  <p>I’m currently a <strong>Causal Inference Graduate Researcher</strong> at New York University. My work spans statistical modeling, causal inference, and computational social science, often incorporating large-scale simulations, cloud computing, and cutting-edge AI methods.</p>
  
  <p>I completed a <strong>B.A. in Computer Science and Data Science</strong> and currently pursuing a <strong>M.S. in Applied Statistics for Social Science Research</strong> at NYU. </p>
  
  <p> My research interests include causal inference, natural language processing, and political behavior analysis.</p>
  
  <p>Outside of research, I enjoy exploring the intersections of data, policy, and society, and translating complex quantitative insights into actionable knowledge.</p>

